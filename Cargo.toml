[workspace]
members = [
  # Core
  "crates/core/fs-core",

  # Adapters
  "crates/adapters/vfs-adapter",
  "crates/adapters/rpc-adapter",

  # Hosts
  "crates/hosts/vfs-host",
  "crates/hosts/vfs-rpc-host",

  # RPC
  "crates/rpc/vfs-rpc-protocol",
  "crates/rpc/vfs-rpc-server",

  # Runners
  "crates/runners/rpc-fs-runner",

  # Examples - RPC
  "examples/rpc/demo-writer",
  "examples/rpc/demo-reader",
  "examples/rpc/demo-std-fs",
  "examples/rpc/demo-direct-rpc",

  # Examples - Component Model
  "examples/component-model/runtime-linker",
]
exclude = [
  ".tmp",
  "deprecated",
  "test-app",
  "test-simple",
  "vfs-rpc-client",
  "vfs-tcp-server",
]
resolver="3"

[profile.dev]
opt-level = 1
