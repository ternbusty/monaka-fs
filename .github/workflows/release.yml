name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs['crates/tools/monaka-cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates/tools/monaka-cli--tag_name'] }}
      any_released: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Create tags for packages with skip-github-release: true
  # release-please requires tags to track release boundaries
  tag-packages:
    needs: release-please
    if: ${{ needs.release-please.outputs.any_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create tags for skip-github-release packages
        run: |
          declare -A PACKAGES=(
            ["crates/core/fs-core"]="fs-core"
            ["crates/sync/vfs-sync-core"]="vfs-sync-core"
            ["crates/sync/vfs-sync-host"]="vfs-sync-host"
            ["crates/sync/vfs-sync-adapter"]="vfs-sync-adapter"
            ["crates/hosts/vfs-host"]="vfs-host"
            ["crates/adapters/vfs-adapter"]="vfs-adapter"
            ["crates/adapters/rpc-adapter"]="rpc-adapter"
            ["crates/rpc/vfs-rpc-protocol"]="vfs-rpc-protocol"
            ["crates/rpc/vfs-rpc-server"]="vfs-rpc-server"
          )
          for path in "${!PACKAGES[@]}"; do
            component="${PACKAGES[$path]}"
            version=$(jq -r ".\"$path\"" .release-please-manifest.json)
            tag="${component}-v${version}"
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Creating tag: $tag"
              git tag "$tag"
            else
              echo "Tag already exists: $tag"
            fi
          done
          git push --tags

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: monaka-darwin-arm64
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: monaka-darwin-amd64
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: monaka-linux-amd64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: monaka-linux-arm64
            use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM (S3 sync variants)
        run: |
          cargo build --release --target wasm32-wasip2 -p vfs-adapter --features s3-sync
          mkdir -p target/wasm32-wasip2/s3-release
          cp target/wasm32-wasip2/release/vfs_adapter.wasm target/wasm32-wasip2/s3-release/vfs_adapter.wasm
          cargo build --release --target wasm32-wasip2 -p vfs-rpc-server --features s3-sync
          cp target/wasm32-wasip2/release/vfs_rpc_server.wasm target/wasm32-wasip2/s3-release/vfs_rpc_server.wasm

      - name: Build WASM (non-S3 variants)
        run: cargo build --release --target wasm32-wasip2 -p vfs-adapter -p rpc-adapter -p vfs-rpc-server

      - name: Build CLI (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} -p monaka

      - name: Build CLI (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p monaka

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/monaka ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          tag_name: ${{ needs.release-please.outputs.tag_name }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p fs-core
          sleep 30
          cargo publish -p vfs-sync-core
          sleep 30
          cargo publish -p vfs-rpc-protocol
          sleep 30
          cargo publish -p vfs-sync-host
          sleep 30
          cargo publish -p vfs-host
