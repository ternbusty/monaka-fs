[package]
name = "vfs-adapter-main"
version = "0.1.0"
edition = "2021"

# Standalone package, not part of workspace
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
# Use main-branch fs-core (Rc<RefCell>, no internal locking)
fs-core = { path = "../fs-main", package = "fs-main", features = ["serde"] }
wit-bindgen = { version = "0.36", default-features = false, features = ["realloc", "macros"] }
spin = "0.9"
serde_json = "1"

[build-dependencies]
wit-bindgen = "0.36"
