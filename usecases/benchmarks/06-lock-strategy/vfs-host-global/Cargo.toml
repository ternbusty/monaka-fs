[package]
name = "vfs-host-global"
version = "0.1.0"
edition = "2021"
description = "VFS Host implementation using global-lock filesystem for benchmarking"

# Standalone package, not part of workspace
[workspace]

[dependencies]
fs-global = { path = "../fs-global" }
wasmtime = { version = "27.0", features = ["component-model"] }
wasmtime-wasi = "27.0"
anyhow = "1"
bytes = "1"
async-trait = "0.1"
log = "0.4"
