[package]
name = "vfs-host-main"
version = "0.1.0"
edition = "2021"

# Standalone package, not part of workspace
[workspace]

[dependencies]
# Main-branch fs-core (with Rc<RefCell>, &mut self)
fs-main = { path = "../fs-main" }

# WASM runtime
wasmtime = { version = "27.0", features = ["component-model"] }
wasmtime-wasi = "27.0"

# Utilities
anyhow = "1.0"
bytes = "1.0"
async-trait = "0.1"
log = "0.4"
