[package]
name = "http-cache-server"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
# HTTP server
axum = "0.7"
tokio = { version = "1", features = ["full"] }

# WASM runtime
wasmtime = { version = "44.0.1", features = ["component-model"] }
wasmtime-wasi = "44.0.1"

# VFS host
vfs-host = { path = "../../../../crates/hosts/vfs-host" }

# Utilities
anyhow = "1.0"
